{% extends "accounts/_auth_shell.html" %}

{% block title %}Check your email — {{ site_name }}{% endblock %}

{% block auth_content %}
<h1 class="text-fluid-xl font-semibold text-neutral-900 dark:text-neutral-50 mb-2">Check your email</h1>
<p class="text-fluid-sm text-neutral-600 dark:text-neutral-300">
  If an account exists with that email, we've sent a link to reset your password.
</p>
<a href="{% url 'accounts:login' %}" class="inline-block mt-6 text-fluid-sm font-medium text-accent-500">&larr; Back to sign in</a>
{% endblock %}
