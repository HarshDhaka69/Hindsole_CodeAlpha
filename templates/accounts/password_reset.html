{% extends "accounts/_auth_shell.html" %}

{% block title %}Reset Password — {{ site_name }}{% endblock %}

{% block auth_content %}
<h1 class="text-fluid-xl font-semibold text-neutral-900 dark:text-neutral-50 mb-1">Reset your password</h1>
<p class="text-fluid-sm text-neutral-500 dark:text-neutral-400 mb-6">We'll email you a link to reset it.</p>

<form method="post" class="space-y-4">
  {% csrf_token %}
  <div>
    <label for="{{ form.email.id_for_label }}" class="block text-fluid-sm font-medium text-neutral-700 dark:text-neutral-200 mb-1.5">Email</label>
    <input
      type="email" name="{{ form.email.html_name }}" id="{{ form.email.id_for_label }}"
      autocomplete="email" inputmode="email" required autofocus
      class="w-full rounded-soft border border-neutral-300 dark:border-neutral-600 bg-white dark:bg-neutral-900 px-4 py-2.5 text-fluid-sm text-neutral-900 dark:text-neutral-50"
    >
  </div>
  <button type="submit" class="w-full rounded-soft bg-accent-500 hover:bg-accent-600 text-white font-semibold py-3 text-fluid-sm transition-colors">
    Send reset link
  </button>
</form>
{% endblock %}
