{% extends "accounts/_auth_shell.html" %}

{% block title %}Password Reset Complete — {{ site_name }}{% endblock %}

{% block auth_content %}
<h1 class="text-fluid-xl font-semibold text-neutral-900 dark:text-neutral-50 mb-2">Password updated</h1>
<p class="text-fluid-sm text-neutral-600 dark:text-neutral-300">Your password has been set. You can now sign in.</p>
<a href="{% url 'accounts:login' %}" class="inline-block mt-6 w-full text-center rounded-soft bg-accent-500 hover:bg-accent-600 text-white font-semibold py-3 text-fluid-sm">
  Sign in
</a>
{% endblock %}
