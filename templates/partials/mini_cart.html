{% load products_extras %}
<!-- Mini cart: full-screen slide-in on mobile, right-side panel on desktop -->
<div
  x-show="miniCartOpen"
  x-cloak
  class="fixed inset-0 z-50"
  style="display: none;"
>
  <div
    x-show="miniCartOpen"
    x-transition:enter="transition-opacity duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click="miniCartOpen = false"
    class="absolute inset-0 bg-neutral-900/50"
  ></div>

  <div
    x-show="miniCartOpen"
    x-transition:enter="transition-transform duration-300 ease-out"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition-transform duration-200 ease-in"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="absolute right-0 top-0 h-full w-full sm:w-[420px] bg-neutral-50 dark:bg-neutral-900 shadow-lifted flex flex-col pt-safe-top pb-safe-bottom"
    @click.outside="miniCartOpen = false"
  >
    <div class="flex items-center justify-between px-5 h-16 border-b border-neutral-200 dark:border-neutral-700 shrink-0">
      <span class="font-display text-fluid-lg font-semibold text-neutral-900 dark:text-neutral-50">Your Bag</span>
      <button @click="miniCartOpen = false" class="tap-target text-neutral-600 dark:text-neutral-300" aria-label="Close cart">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div id="mini-cart-body" class="flex-1 overflow-y-auto px-5 py-4">
      {% include "cart/_mini_cart_items.html" %}
    </div>

    {% include "cart/_mini_cart_footer.html" %}
  </div>
</div>
