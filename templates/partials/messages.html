{% if messages %}
<div class="fixed top-20 inset-x-0 z-50 flex flex-col items-center gap-2 px-4 pointer-events-none">
  {% for message in messages %}
  <div
    x-data="{ show: true }"
    x-show="show"
    x-init="setTimeout(() => show = false, 4000)"
    x-transition
    class="pointer-events-auto max-w-md w-full rounded-soft shadow-lifted px-4 py-3 text-fluid-sm font-medium flex items-center gap-2
      {% if message.tags == 'error' %}bg-error-500 text-white
      {% elif message.tags == 'success' %}bg-success-500 text-white
      {% elif message.tags == 'warning' %}bg-accent-500 text-white
      {% else %}bg-neutral-800 text-white{% endif %}"
  >
    <span class="flex-1">{{ message }}</span>
    <button @click="show = false" class="tap-target shrink-0 -mr-2" aria-label="Dismiss">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
