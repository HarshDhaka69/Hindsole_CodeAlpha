<header class="sticky top-0 z-40 bg-neutral-50/95 dark:bg-neutral-900/95 backdrop-blur-sm border-b border-neutral-200 dark:border-neutral-700 pt-safe-top">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 lg:h-20 items-center justify-between gap-4">

      <!-- Hamburger trigger: visible below lg, hidden at lg+ where mega-menu nav takes over -->
      <button
        type="button"
        @click="mobileMenuOpen = true"
        class="tap-target -ml-2 lg:hidden text-neutral-700 dark:text-neutral-200"
        aria-label="Open menu"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
        </svg>
      </button>

      <!-- Wordmark -->
      <a href="{% url 'products:home' %}" class="font-display text-fluid-xl font-semibold tracking-tight text-neutral-900 dark:text-neutral-50 shrink-0">
        HINDSOLE
      </a>

      <!-- Desktop mega-menu nav -->
      <nav class="hidden lg:flex items-center gap-8 flex-1 justify-center" aria-label="Primary">
        <div class="group relative">
          <button class="flex items-center gap-1 text-fluid-sm font-medium text-neutral-700 dark:text-neutral-200 hover:text-accent-500 py-2">
            Brands
            <svg class="h-4 w-4 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div class="invisible group-hover:visible group-focus-within:visible opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 absolute left-1/2 -translate-x-1/2 top-full pt-3 transition-all duration-200 z-50">
            <div class="bg-white dark:bg-neutral-800 rounded-card shadow-lifted border border-neutral-150 dark:border-neutral-700 p-6 grid grid-cols-2 gap-x-8 gap-y-3 min-w-[320px]">
              {% for brand in nav_brands %}
                <a href="{{ brand.get_absolute_url }}" class="text-fluid-sm text-neutral-600 dark:text-neutral-300 hover:text-accent-500 whitespace-nowrap">{{ brand.name }}</a>
              {% endfor %}
            </div>
          </div>
        </div>

        <div class="group relative">
          <button class="flex items-center gap-1 text-fluid-sm font-medium text-neutral-700 dark:text-neutral-200 hover:text-accent-500 py-2">
            Categories
            <svg class="h-4 w-4 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div class="invisible group-hover:visible group-focus-within:visible opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 absolute left-1/2 -translate-x-1/2 top-full pt-3 transition-all duration-200 z-50">
            <div class="bg-white dark:bg-neutral-800 rounded-card shadow-lifted border border-neutral-150 dark:border-neutral-700 p-6 flex flex-col gap-3 min-w-[220px]">
              {% for category in nav_categories %}
                <a href="{% url 'products:list' %}?category={{ category.slug }}" class="text-fluid-sm text-neutral-600 dark:text-neutral-300 hover:text-accent-500 whitespace-nowrap">{{ category.name }}</a>
              {% endfor %}
            </div>
          </div>
        </div>

        <a href="{% url 'products:list' %}?tag=limited-drop" class="text-fluid-sm font-medium text-accent-500 hover:text-accent-600">New Drops</a>
        <a href="{% url 'products:list' %}" class="text-fluid-sm font-medium text-neutral-700 dark:text-neutral-200 hover:text-accent-500">Shop All</a>
      </nav>

      <!-- Right cluster: dark mode, account, cart -->
      <div class="flex items-center gap-1 sm:gap-2 shrink-0">
        <button
          type="button"
          @click="darkMode = !darkMode"
          class="tap-target text-neutral-600 dark:text-neutral-300 hover:text-accent-500"
          aria-label="Toggle dark mode"
        >
          <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1.5m0 15V21m9-9h-1.5M4.5 12H3m15.36 6.36-1.06-1.06M6.7 6.7 5.64 5.64m12.72 0-1.06 1.06M6.7 17.3l-1.06 1.06M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" /></svg>
          <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>

        <a href="{% if user.is_authenticated %}{% url 'accounts:profile' %}{% else %}{% url 'accounts:login' %}{% endif %}" class="tap-target hidden sm:flex text-neutral-600 dark:text-neutral-300 hover:text-accent-500" aria-label="Account">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
        </a>

        <button
          type="button"
          @click="miniCartOpen = true"
          class="tap-target relative text-neutral-700 dark:text-neutral-200 hover:text-accent-500"
          aria-label="Open cart"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5 h-[22px] w-[22px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 1.98-4.694 2.57-7.166.158-.65-.298-1.234-.96-1.234H5.85m1.5 11.4h11.218m-11.218 0a3 3 0 100 6 3 3 0 000-6zm11.218 0a3 3 0 100 6 3 3 0 000-6z" /></svg>
          <span
            id="cart-badge"
            class="{% if cart_quantity == 0 %}hidden{% endif %} absolute -top-1.5 -right-1.5 flex items-center justify-center h-5 w-5 rounded-full bg-accent-500 text-white text-[11px] font-semibold leading-none"
          >{{ cart_quantity }}</span>
        </button>
      </div>
    </div>
  </div>
</header>
